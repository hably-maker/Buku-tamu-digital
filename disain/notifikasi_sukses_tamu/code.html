<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            display: inline-block;
            vertical-align: middle;
        }
        
        @keyframes draw-checkmark {
            0% { stroke-dashoffset: 48; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes scale-up {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-checkmark {
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: draw-checkmark 0.6s ease-out forwards 0.2s;
        }

        .animate-popup {
            animation: scale-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .countdown-bar {
            transition: width 3s linear;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen flex flex-col items-center justify-center p-md">
<!-- Success Message Container (Kiosk Centric Layout) -->
<main class="max-w-[800px] w-full bg-surface-container-lowest rounded-xl border border-outline-variant p-3xl flex flex-col items-center text-center shadow-md animate-popup">
<!-- Large Green Success Icon -->
<div class="relative mb-xl">
<div class="w-32 h-32 rounded-full bg-secondary-container flex items-center justify-center">
<svg class="w-20 h-20 text-on-secondary-container fill-none stroke-current stroke-[2.5]" stroke-linecap="round" stroke-linejoin="round" viewbox="0 0 24 24">
<polyline class="animate-checkmark" points="20 6 9 17 4 12"></polyline>
</svg>
</div>
<!-- Ambient Pulse Effect -->
<div class="absolute inset-0 rounded-full bg-secondary opacity-10 animate-ping"></div>
</div>
<!-- Success Message -->
<h1 class="font-display-kiosk text-display-kiosk text-on-background mb-md">
            Terima Kasih!
        </h1>
<p class="font-headline-md text-headline-md text-on-surface-variant mb-lg">
            Data Anda telah berhasil disimpan.
        </p>
<!-- Subtext & Progress Indicator -->
<div class="mb-2xl w-full max-w-sm">
<p class="font-body-md text-body-md text-on-surface-variant mb-sm">
                Formulir akan otomatis kembali ke awal dalam <span class="font-bold" id="timer">3</span> detik.
            </p>
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="countdown-bar h-full bg-secondary w-0" id="progress-bar"></div>
</div>
</div>
<!-- Selesai Button (Manual Trigger) -->
<button class="min-h-[56px] px-3xl bg-primary text-on-primary font-body-lg text-body-lg rounded-lg hover:opacity-90 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-sm" id="btn-selesai">
            Selesai
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</main>
<!-- Contextual Footer -->
<footer class="mt-xl text-center">
<p class="text-on-surface-variant font-label-md text-label-md">
            © 2024 GuestFlow Enterprise. All rights reserved.
        </p>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const timerElement = document.getElementById('timer');
            const progressBar = document.getElementById('progress-bar');
            const btnSelesai = document.getElementById('btn-selesai');
            
            let count = 3;

            // Start the progress bar animation immediately
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 50);

            // Countdown Logic
            const countdownInterval = setInterval(() => {
                count--;
                if (count >= 0) {
                    timerElement.textContent = count;
                }
                
                if (count === 0) {
                    clearInterval(countdownInterval);
                    handleReset();
                }
            }, 1000);

            // Manual reset trigger
            btnSelesai.addEventListener('click', () => {
                clearInterval(countdownInterval);
                handleReset();
            });

            function handleReset() {
                // In a real kiosk app, this would route back to the start page
                // For demonstration, we'll simulate a transition
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease-out';
                
                setTimeout(() => {
                    console.log('Redirecting to Home...');
                    // location.reload() or window.location.href = '/'
                    alert('Redirecting to Home Screen...');
                    document.body.style.opacity = '1';
                }, 500);
            }
        });

        // Simple parallax / interactive effect for the background
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const moveX = (x - 0.5) * 10;
            const moveY = (y - 0.5) * 10;
            
            document.querySelector('main').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
